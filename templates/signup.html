<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - CropGuard AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-header">
            <div class="logo-wrapper">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="CropGuard Logo" style="height: 24px; width: auto; filter: brightness(0) invert(1);"> 
                <strong>CropGuard AI</strong>
            </div>
            <h1>Crop Disease<br>Segmentation</h1>
            <p>AI-Powered Leaf Analysis Platform</p>
        </div>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="error-message" style="background-color: #fee2e2; color: #991b1b; padding: 10px; border-radius: 8px; margin-bottom: 20px; font-size: 0.9rem;">
              {{ messages[0] }}
            </div>
          {% endif %}
        {% endwith %}

        <form action="{{ url_for('signup') }}" method="POST" class="login-form">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" name="full_name" placeholder="Enter your full name" required>
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>
            
            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>

            <div class="input-group">
                <label>Confirm Password</label>
                <input type="password" name="confirm_password" placeholder="Confirm your password" required>
            </div>

            <button type="submit" class="sign-in-btn">
                <span class="btn-icon">👤</span> Create Account
            </button>
        </form>

        <p class="signup-text">Already have an account? <a href="{{ url_for('login') }}">Sign In</a></p>
    </div>
</body>
</html>
