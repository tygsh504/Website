<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CropGuard AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-header">
            <div class="logo-wrapper">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="CropGuard Logo" class="login-logo-img"> 
                <strong>CropGuard AI</strong>
            </div>
            <h1>Crop Disease<br>Segmentation</h1>
            <p>AI-Powered Leaf Analysis Platform</p>
        </div>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="error-message">
              {{ messages[0] }}
            </div>
          {% endif %}
        {% endwith %}

        <form action="{{ url_for('login') }}" method="POST" id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-input">
                        <input type="password" id="password" name="password" required>
                        <button type="button" class="toggle-password" onclick="togglePassword()">👁</button>
                    </div>
                </div>
                
                <div class="remember-me">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Remember me</label>
                </div>

                <button type="submit" class="btn-login">Login</button>
                
                <div class="divider"><span>OR</span></div>
                <a href="{{ url_for('login_google') }}" class="btn-google">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo">
                    Sign in with Google
                </a>
            </form>

            <p class="signup-link">Don't have an account? <a href="{{ url_for('signup') }}">Sign up</a></p>
        </div>
    </div>

    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
            } else {
                passwordInput.type = 'password';
            }
        }

        // NEW: Remember Me Functionality
        document.addEventListener("DOMContentLoaded", function() {
            const emailInput = document.getElementById("email");
            const passwordInput = document.getElementById("password");
            const rememberCheck = document.getElementById("remember");
            const loginForm = document.getElementById("loginForm");

            // Check if credentials were saved previously
            if (localStorage.getItem("rememberMe") === "true") {
                emailInput.value = localStorage.getItem("savedEmail") || "";
                passwordInput.value = localStorage.getItem("savedPassword") || "";
                rememberCheck.checked = true;
            }

            // Save credentials to browser storage when form is submitted
            loginForm.addEventListener("submit", function() {
                if (rememberCheck.checked) {
                    localStorage.setItem("rememberMe", "true");
                    localStorage.setItem("savedEmail", emailInput.value);
                    localStorage.setItem("savedPassword", passwordInput.value);
                } else {
                    localStorage.removeItem("rememberMe");
                    localStorage.removeItem("savedEmail");
                    localStorage.removeItem("savedPassword");
                }
            });
        });
    </script>

        <p class="signup-text">Don't have an account? <a href="{{ url_for('signup') }}">Sign Up</a></p>
        
        <div class="divider"><span>Or continue with</span></div>
    </div>
</body>
</html>
