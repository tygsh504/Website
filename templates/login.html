<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CropGuard AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-header">
            <div class="logo-wrapper">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="CropGuard Logo" class="login-logo-img"> 
                <strong>CropGuard AI</strong>
            </div>
            <h1>Crop Disease<br>Segmentation</h1>
            <p>AI-Powered Leaf Analysis Platform</p>
        </div>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="error-message">
              {{ messages[0] }}
            </div>
          {% endif %}
        {% endwith %}

        <form action="{{ url_for('login') }}" method="POST" class="login-form" id="loginForm">
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="user@gmail.com" required>
            </div>
            
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••••••" required>
            </div>

            <div class="form-options">
                <label><input type="checkbox" id="remember" name="remember"> Remember me</label>
                <a href="#" class="forgot-link">Forgot password?</a>
            </div>

            <button type="submit" class="sign-in-btn">
                <span class="btn-icon">➔</span> Sign In
            </button>
            
            <div class="divider"><span>Or continue with</span></div>
            
            <a href="{{ url_for('login_google') }}" class="google-btn text-decoration-none">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo">
                Sign in with Google
            </a>
        </form>

        <p class="signup-text">Don't have an account? <a href="{{ url_for('signup') }}">Sign Up</a></p>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const emailInput = document.getElementById("email");
            const passwordInput = document.getElementById("password");
            const rememberCheck = document.getElementById("remember");
            const loginForm = document.getElementById("loginForm");

            if (localStorage.getItem("rememberMe") === "true") {
                emailInput.value = localStorage.getItem("savedEmail") || "";
                passwordInput.value = localStorage.getItem("savedPassword") || "";
                rememberCheck.checked = true;
            }

            loginForm.addEventListener("submit", function() {
                if (rememberCheck.checked) {
                    localStorage.setItem("rememberMe", "true");
                    localStorage.setItem("savedEmail", emailInput.value);
                    localStorage.setItem("savedPassword", passwordInput.value);
                } else {
                    localStorage.removeItem("rememberMe");
                    localStorage.removeItem("savedEmail");
                    localStorage.removeItem("savedPassword");
                }
            });
        });
    </script>
</body>
</html>
