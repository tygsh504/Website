<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Disease Map - CropGuard AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
</head>
<body class="upload-page-body">
    <header>
        <nav class="navbar navbar-solid navbar-fixed-full">
            <div class="logo"><img src="{{ url_for('static', filename='images/logo.png') }}" alt="CropGuard Logo" class="nav-logo-img"> <strong>CropGuard AI</strong></div>
            <ul class="nav-links">
                <li><a href="{{ url_for('root') }}">Home</a></li>
                <li class="dropdown">
                    <a href="{{ url_for('upload_menu') }}" class="dropbtn">Upload ▾</a>
                    <div class="dropdown-content">
                        <a href="{{ url_for('upload_image') }}">Upload Image</a>
                        <a href="{{ url_for('capture_image') }}">Capture Image</a>
                        <a href="{{ url_for('history') }}">History</a>
                    </div>
                </li>
                <li><a href="{{ url_for('analysis') }}">Analysis</a></li>
                <li><a href="{{ url_for('disease_map') }}" class="active">Disease Map</a></li>
            </ul>
            <div class="user-actions">
                <span class="user-name">{{ user_name }}</span>
                <a href="{{ url_for('logout') }}" class="logout-btn"><span class="icon">⏻</span> Logout</a>
            </div>
        </nav>
    </header>

    <div class="map-layout">
        <div class="map-sidebar">
            <div class="map-sidebar-header">
                <h2>Disease Analysis</h2>
                <p class="subtitle">Geographical monitoring of infection levels</p>
            </div>
            
            <div class="sidebar-stats-wrapper">
                <div class="stat-box flex-1">
                    <h3 id="total-scans">0</h3>
                    <span>Total Scans</span>
                </div>
                <div class="stat-box high-risk flex-1">
                    <h3 id="high-risk-count">0</h3>
                    <span>High Infection</span>
                </div>
                <div class="stat-box medium-risk flex-1">
                    <h3 id="medium-risk-count">0</h3>
                    <span>Medium Infection</span>
                </div>
                <div class="stat-box low-risk flex-1">
                    <h3 id="low-risk-count">0</h3>
                    <span>Low Infection</span>
                </div>
            </div>
        </div>

        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <script>
        // Data injected from Flask
        const rawData = {{ map_data | tojson }};
        
        // Settings for Analysis
        const CLUSTER_RADIUS = 30; // meters (Distance to group markers)
        const HIGH_THRESHOLD = 4; // 4 or more cases in radius
        const MEDIUM_THRESHOLD = 2; // 2-3 cases in radius
        
        // Initialize Map
        const map = L.map('map', { attributionControl: false }).setView([4.2105, 101.9758], 6);
        
        // Add OpenStreetMap Tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19
        }).addTo(map);
        
        // Haversine formula to calculate distance between two coordinates in meters
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; // Earth radius in meters
            const p1 = lat1 * Math.PI/180;
            const p2 = lat2 * Math.PI/180;
            const dp = (lat2-lat1) * Math.PI/180;
            const dl = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dp/2) * Math.sin(dp/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        // Custom Colored Icons
        const redIcon = L.icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
        });
        const orangeIcon = L.icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-orange.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
        });
        const yellowIcon = L.icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-yellow.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
        });

        document.getElementById('total-scans').innerText = rawData.length;
        
        // Run Clustering Algorithm
        let visited = new Set();
        let clusters = [];
        
        rawData.forEach((point, i) => {
            if (visited.has(i)) return;
            let currentCluster = [point];
            visited.add(i);
            
            rawData.forEach((otherPoint, j) => {
                if (i !== j && !visited.has(j)) {
                    let distance = getDistance(point.lat, point.lon, otherPoint.lat, otherPoint.lon);
                    if (distance <= CLUSTER_RADIUS) {
                        currentCluster.push(otherPoint);
                        visited.add(j);
                    }
                }
            });
            clusters.push(currentCluster);
        });

        // Map rendering variables
        let bounds = [];
        let highCases = 0, mediumCases = 0, lowCases = 0;

        clusters.forEach((cluster) => {
            let size = cluster.length;
            let iconToUse, circleColor;
            
            if (size >= HIGH_THRESHOLD) {
                iconToUse = redIcon;
                circleColor = '#dc2626'; // Red
                highCases += size;
            } else if (size >= MEDIUM_THRESHOLD) {
                iconToUse = orangeIcon;
                circleColor = '#f97316'; // Orange
                mediumCases += size;
            } else {
                iconToUse = yellowIcon;
                circleColor = '#eab308'; // Yellow
                lowCases += size;
            }
            
            // Draw a warning circle for grouped clusters (Medium and High)
            if (size >= MEDIUM_THRESHOLD) {
                let centerLat = cluster.reduce((sum, p) => sum + p.lat, 0) / size;
                let centerLon = cluster.reduce((sum, p) => sum + p.lon, 0) / size;
                
                L.circle([centerLat, centerLon], {
                    color: circleColor,
                    fillColor: circleColor,
                    fillOpacity: 0.2,
                    radius: CLUSTER_RADIUS
                }).addTo(map);
            }
            
            // Plot individual markers with respective color
            cluster.forEach(point => {
                let marker = L.marker([point.lat, point.lon], { icon: iconToUse }).addTo(map);
                
                // Add popup
                marker.bindPopup(`
                    <img src="${point.thumbnail}" alt="Crop Scan">
                    <p>${point.name}</p>
                    <p class="cluster-date-text">Date: ${point.date}</p>
                    <a href="${point.link}" target="_blank">Open inside Drive ➔</a>
                `);
                bounds.push([point.lat, point.lon]);
            });
        });

        // Update UI
        document.getElementById('high-risk-count').innerText = highCases;
        document.getElementById('medium-risk-count').innerText = mediumCases;
        document.getElementById('low-risk-count').innerText = lowCases;

        // Adjust map to show all pins
        if (bounds.length > 0) {
            map.fitBounds(bounds, { padding: [50, 50] });
        }
    </script>
</body>
</html>
