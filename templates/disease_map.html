<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Disease Map - CropGuard AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
</head>
<body class="upload-page-body">
    <header>
        <nav class="navbar navbar-solid navbar-fixed-full">
            <div class="logo"><img src="{{ url_for('static', filename='images/logo.png') }}" alt="CropGuard Logo" class="nav-logo-img"> <strong>CropGuard AI</strong></div>
            <ul class="nav-links">
                <li><a href="{{ url_for('root') }}">Home</a></li>
                <li class="dropdown">
                    <a href="{{ url_for('upload_menu') }}" class="dropbtn">Upload ▾</a>
                    <div class="dropdown-content">
                        <a href="{{ url_for('upload_image') }}">Upload Image</a>
                        <a href="{{ url_for('history') }}">History</a>
                    </div>
                </li>
                <li><a href="{{ url_for('analysis') }}">Analysis</a></li>
                <li><a href="{{ url_for('disease_map') }}" class="active">Disease Map</a></li>
            </ul>
            <div class="user-actions">
                <span class="user-name">{{ user_name }}</span>
                <a href="{{ url_for('logout') }}" class="logout-btn"><span class="icon">⏻</span> Logout</a>
            </div>
        </nav>
    </header>

    <div class="map-layout">
        <div class="map-sidebar">
            <h2>Disease Analysis</h2>
            <p class="subtitle">Geographical monitoring and high-risk clustering.</p>
            
            <div class="sidebar-stats-wrapper">
                <div class="stat-box flex-1">
                    <h3 id="total-scans">0</h3>
                    <span>Total Scans</span>
                </div>
                <div class="stat-box high-risk flex-1">
                    <h3 id="high-risk-count">0</h3>
                    <span>High Risk Zones</span>
                </div>
            </div>
            
            <h3 class="sidebar-cluster-title">Detected Clusters</h3>
            
            <div id="cluster-list">
                <p class="cluster-loading-text">Scanning map for high-density disease areas...</p>
            </div>
        </div>

        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <script>
        // Data injected from Flask
        const rawData = {{ map_data | tojson }};
        
        // Settings for Analysis
        const HIGH_RISK_RADIUS = 30; // meters (Distance to group markers)
        const HIGH_RISK_MIN_POINTS = 2; // Minimum markers in radius to flag as high risk
        
        // Initialize Map (Added attributionControl: false to remove the Leaflet logo)
        const map = L.map('map', { attributionControl: false }).setView([4.2105, 101.9758], 6);
        
        // Add OpenStreetMap Tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19
        }).addTo(map);
        
        // Haversine formula to calculate distance between two coordinates in meters
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; // Earth radius in meters
            const p1 = lat1 * Math.PI/180;
            const p2 = lat2 * Math.PI/180;
            const dp = (lat2-lat1) * Math.PI/180;
            const dl = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dp/2) * Math.sin(dp/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        // Custom Icons
        const defaultIcon = L.icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
        });

        const dangerIcon = L.icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
        });

        document.getElementById('total-scans').innerText = rawData.length;
        
        // Run Clustering Algorithm
        let visited = new Set();
        let clusters = [];
        
        rawData.forEach((point, i) => {
            if (visited.has(i)) return;
            let currentCluster = [point];
            visited.add(i);
            
            rawData.forEach((otherPoint, j) => {
                if (i !== j && !visited.has(j)) {
                    let distance = getDistance(point.lat, point.lon, otherPoint.lat, otherPoint.lon);
                    if (distance <= HIGH_RISK_RADIUS) {
                        currentCluster.push(otherPoint);
                        visited.add(j);
                    }
                }
            });
            clusters.push(currentCluster);
        });

        // Map rendering
        let bounds = [];
        let highRiskCount = 0;
        const clusterListDiv = document.getElementById('cluster-list');
        clusterListDiv.innerHTML = '';

        if (rawData.length === 0) {
            clusterListDiv.innerHTML = '<p class="cluster-empty-text">No geographic data found yet. Upload images with GPS location enabled.</p>';
        }

        clusters.forEach((cluster, index) => {
            let isHighRisk = cluster.length >= HIGH_RISK_MIN_POINTS;
            
            // Calculate center of cluster for drawing the circle
            let centerLat = cluster.reduce((sum, p) => sum + p.lat, 0) / cluster.length;
            let centerLon = cluster.reduce((sum, p) => sum + p.lon, 0) / cluster.length;
            
            if (isHighRisk) {
                highRiskCount++;
                // Draw a warning circle
                L.circle([centerLat, centerLon], {
                    color: '#dc2626',
                    fillColor: '#ef4444',
                    fillOpacity: 0.2,
                    radius: HIGH_RISK_RADIUS
                }).addTo(map);

                // Add sidebar card
                clusterListDiv.innerHTML += `
                    <div class="cluster-card">
                        <h4>⚠️ High Risk Zone ${highRiskCount}</h4>
                        <p><strong>Density:</strong> ${cluster.length} affected crops found within a ${HIGH_RISK_RADIUS}m radius.</p>
                        <p class="cluster-coords-text">📍 ${centerLat.toFixed(5)}, ${centerLon.toFixed(5)}</p>
                    </div>
                `;
            }
            
            // Plot individual markers
            cluster.forEach(point => {
                let marker = L.marker([point.lat, point.lon], { icon: isHighRisk ? dangerIcon : defaultIcon }).addTo(map);
                
                // Add popup
                marker.bindPopup(`
                    <img src="${point.thumbnail}" alt="Crop Scan">
                    <p>${point.name}</p>
                    <p class="cluster-date-text">Date: ${point.date}</p>
                    <a href="${point.link}" target="_blank">Open inside Drive ➔</a>
                `);
                bounds.push([point.lat, point.lon]);
            });
        });

        document.getElementById('high-risk-count').innerText = highRiskCount;
        if (highRiskCount === 0 && rawData.length > 0) {
             clusterListDiv.innerHTML = '<p class="cluster-safe-text">No high-density disease clusters detected. Spacing is currently safe.</p>';
        }

        // Adjust map to show all pins
        if (bounds.length > 0) {
            map.fitBounds(bounds, { padding: [50, 50] });
        }
    </script>
</body>
</html>
